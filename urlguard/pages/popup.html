<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 420px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; color: #111; font-size: 13px; }
.header { padding: 10px 14px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 14px; font-weight: 600; }
.tab-bar { display: flex; border-bottom: 1px solid #e5e7eb; }
.tab { flex: 1; padding: 8px; text-align: center; cursor: pointer; font-size: 12px; color: #6b7280; border-bottom: 2px solid transparent; }
.tab.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 600; }
.panel { display: none; max-height: 450px; overflow-y: auto; }
.panel.active { display: block; }
.empty { padding: 30px 14px; text-align: center; color: #9ca3af; }

/* Tree styles */
.tree-root { padding: 6px 0; }
.tree-chain { padding: 8px 14px; border-bottom: 1px solid #f3f4f6; }
.tree-chain-header { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.chain-type.redirect { color: #d97706; }
.chain-type.background { color: #6b7280; }
.chain-type.blocked { color: #dc2626; }
.blocked-summary { padding: 6px 14px; background: #fef2f2; border-bottom: 1px solid #fecaca; font-size: 12px; color: #dc2626; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.blocked-shield { font-size: 14px; }
.tree-node { position: relative; padding-left: 20px; margin: 3px 0; }
.tree-node::before { content: ''; position: absolute; left: 6px; top: 0; bottom: 50%; border-left: 1px solid #d1d5db; border-bottom: 1px solid #d1d5db; width: 10px; height: 50%; }
.tree-node:first-child::before { border-left: none; border-bottom: none; }
.tree-node:first-child { padding-left: 0; }
.tree-connector { position: absolute; left: 6px; top: 50%; bottom: -3px; border-left: 1px solid #d1d5db; }
.tree-node:last-child .tree-connector { display: none; }
.node-content { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; position: relative; }
.node-domain { font-weight: 500; }
.node-domain.is-page { color: #6b7280; }
.node-domain.is-third-party { color: #111; }
.node-blocked { color: #dc2626; text-decoration: line-through; }
.node-badge { font-size: 9px; padding: 1px 4px; border-radius: 3px; }
.node-badge.blocked { background: #fef2f2; color: #dc2626; }
.node-badge.initiator { background: #f0f9ff; color: #2563eb; }
.node-hover-actions { display: none; margin-left: 4px; gap: 2px; align-items: center; }
.tree-node:hover .node-hover-actions { display: inline-flex; }
.node-hover-actions button { padding: 1px 6px; border-radius: 3px; border: 1px solid #e5e7eb; background: #fff; cursor: pointer; font-size: 10px; line-height: 1.4; }
.node-hover-actions .h-block { color: #dc2626; border-color: #fecaca; }
.node-hover-actions .h-block:hover { background: #fef2f2; }
.node-hover-actions .h-ignore { color: #6b7280; }
.node-hover-actions .h-ignore:hover { background: #f9fafb; }
.tree-actions { padding: 4px 0 2px 20px; display: flex; gap: 4px; flex-wrap: wrap; }
.tree-actions button { padding: 2px 8px; border-radius: 3px; border: 1px solid #e5e7eb; background: #fff; cursor: pointer; font-size: 10px; }
.tree-actions .block { color: #dc2626; border-color: #fecaca; }
.tree-actions .block:hover { background: #fef2f2; }
.tree-actions .ignore { color: #6b7280; }
.tree-actions .ignore:hover { background: #f9fafb; }
.block-all-bar { padding: 8px 14px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
.block-all-bar button { padding: 4px 10px; border-radius: 4px; border: 1px solid #fecaca; background: #fff; cursor: pointer; font-size: 11px; color: #dc2626; }
.block-all-bar button:hover { background: #fef2f2; }
.block-all-bar span { font-size: 11px; color: #6b7280; }

/* Blocked list */
.list-item { padding: 8px 14px; border-bottom: 1px solid #f3f4f6; display: flex; justify-content: space-between; align-items: center; }
.list-item .hover-actions { display: none; gap: 4px; }
.list-item:hover .hover-actions { display: flex; }
.list-domain { font-size: 13px; font-weight: 500; }
.hover-actions button { padding: 3px 8px; border-radius: 4px; border: 1px solid #e5e7eb; background: #fff; cursor: pointer; font-size: 11px; }
.hover-actions .btn-unblock { color: #059669; border-color: #a7f3d0; }
.hover-actions .btn-unblock:hover { background: #ecfdf5; }
.hover-actions .btn-block { color: #dc2626; border-color: #fecaca; }
.hover-actions .btn-block:hover { background: #fef2f2; }
.hover-actions .btn-remove { color: #6b7280; }
.hover-actions .btn-remove:hover { background: #f9fafb; }
.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
.status-dot.active { background: #059669; }
</style>
</head>
<body>
<div class="header">
  <h1><span class="status-dot active"></span>URLGuard</h1>
  <div style="display:flex;align-items:center;gap:6px;">
    <span id="page-domain" style="font-size:11px;color:#6b7280;"></span>
    <button id="block-page-btn" style="padding:2px 6px;border-radius:3px;border:1px solid #fecaca;background:#fff;cursor:pointer;font-size:10px;color:#dc2626;display:none;">Block this site</button>
  </div>
</div>
<div class="tab-bar">
  <div class="tab active" data-tab="activity">Activity</div>
  <div class="tab" data-tab="blocked">Blocked</div>
  <div class="tab" data-tab="ignored">Allowed</div>
</div>
<div class="panel active" id="panel-activity">
  <div id="blocked-summary" class="blocked-summary" style="display:none;">
    <span class="blocked-shield">🛡</span>
    <span id="blocked-summary-text"></span>
  </div>
  <div class="empty" id="empty-msg">No suspicious activity on this page</div>
  <div id="block-all-bar" class="block-all-bar" style="display:none;">
    <span id="activity-count"></span>
    <button id="block-all-btn">Block all 3rd party domains</button>
  </div>
  <div id="events-list" class="tree-root"></div>
</div>
<div class="panel" id="panel-blocked">
  <div class="empty" id="blocked-empty">No domains blocked yet</div>
  <div id="blocked-list"></div>
</div>
<div class="panel" id="panel-ignored">
  <div class="empty" id="ignored-empty">No domains allowed yet</div>
  <div id="ignored-list"></div>
</div>
<script src="popup.js"></script>
</body>
</html>
